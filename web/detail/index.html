<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>개원 입지 상세</title>
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="anonymous" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif; }
    body { background: #f5f5f5; color: #222; }
    #app { display: flex; flex-direction: column; height: 100%; }
    header { padding: 8px 12px; background: #fff; border-bottom: 1px solid #e0e0e0; }
    header h1 { margin: 0; font-size: 15px; font-weight: 600; }
    header .meta { margin-top: 2px; font-size: 12px; color: #666; }
    header .badge { display: inline-block; padding: 1px 6px; margin-right: 4px; border-radius: 3px; font-size: 11px; font-weight: 600; background: #e3f2fd; color: #1565c0; }
    header .flag { display: inline-block; padding: 1px 6px; margin-right: 4px; border-radius: 3px; font-size: 11px; background: #fff3e0; color: #ef6c00; }
    header .flag.red { background: #ffebee; color: #c62828; }
    #map { flex: 0 0 50vh; width: 100%; }
    #list-wrap { flex: 1; overflow-y: auto; background: #fff; padding: 6px 0; }
    .clinic { padding: 8px 12px; border-bottom: 1px solid #eee; cursor: pointer; transition: background .08s; opacity: 0.55; }
    .clinic:hover { background: #f0f7ff; }
    .clinic.active { background: #fff59d; }
    .clinic.internal { background: #ffebee; opacity: 1; border-left: 3px solid #e53935; }
    .clinic.internal.active { background: #ffd54f; }
    .clinic.gi { background: #ffe0b2; opacity: 1; border-left: 3px solid #e65100; }
    .clinic.gi.active { background: #ffd54f; }
    .clinic .top { display: flex; align-items: baseline; gap: 8px; font-size: 14px; }
    .clinic .dist { font-weight: 600; color: #1565c0; min-width: 40px; }
    .clinic .name { font-weight: 600; }
    .clinic .gi-star { color: #e65100; }
    .clinic .int-tag { display: inline-block; background: #e53935; color: #fff; font-size: 10px; padding: 1px 5px; border-radius: 3px; margin-right: 4px; vertical-align: middle; font-weight: 700; }
    .clinic .kind { color: #757575; font-size: 12px; font-weight: normal; margin-left: auto; }
    .clinic .sub { font-size: 12px; color: #666; margin-top: 2px; padding-left: 48px; }
    .clinic .links { padding-left: 48px; margin-top: 4px; display: flex; gap: 6px; flex-wrap: wrap; }
    .clinic .links a { display: inline-flex; align-items: center; gap: 2px; padding: 2px 6px; font-size: 11px; background: #fff; border: 1px solid #bbb; border-radius: 3px; text-decoration: none; color: #444; }
    .clinic .links a:hover { background: #e3f2fd; border-color: #1565c0; }
    .clinic .links a.home { background: #e3f2fd; color: #0d47a1; border-color: #1565c0; font-weight: 600; }
    .filter-bar { padding: 6px 12px; background: #f5f5f5; border-bottom: 1px solid #ddd; display: flex; gap: 8px; align-items: center; font-size: 12px; }
    .filter-bar label { display: inline-flex; align-items: center; gap: 4px; cursor: pointer; }
    .filter-bar .count { color: #666; font-size: 11px; margin-left: auto; }
    .loading { padding: 20px; text-align: center; color: #888; }
    .popup-body { font-size: 13px; line-height: 1.4; }
    .popup-body b { color: #1565c0; }
    header .tag { display: inline-block; padding: 1px 6px; margin-right: 4px; border-radius: 3px; font-size: 11px; background: #e8f5e9; color: #2e7d32; font-weight: 600; }
    header .sido-rank { color: #999; font-size: 11px; margin-left: 4px; }
    .survey-links { padding: 8px 12px; background: #fffbe6; border-bottom: 1px solid #ffe082; display: flex; gap: 8px; flex-wrap: wrap; font-size: 12px; }
    .survey-links a { display: inline-flex; align-items: center; gap: 3px; padding: 4px 8px; background: #fff; border: 1px solid #ffd54f; border-radius: 4px; text-decoration: none; color: #5d4037; font-weight: 500; }
    .survey-links a:hover { background: #fff8e1; }
    .survey-links .est { background: #c8e6c9; border-color: #66bb6a; color: #1b5e20; }
    .survey-links .hint { font-size: 11px; color: #6d4c41; margin-left: auto; align-self: center; }
    @media (min-width: 720px) {
      #app { flex-direction: row; }
      #map { flex: 1; height: 100%; }
      #list-wrap { flex: 0 0 360px; border-left: 1px solid #e0e0e0; }
      header { position: absolute; top: 0; left: 0; right: 360px; z-index: 1000; border-radius: 0 0 6px 0; box-shadow: 0 2px 4px rgba(0,0,0,.08); background: #fff; }
      header #hdr-body { padding: 8px 12px; }
      header .survey-links { border-bottom-left-radius: 0; border-bottom-right-radius: 6px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <header id="hdr">
      <div id="hdr-body"><div class="loading">로딩…</div></div>
      <div id="survey-links" class="survey-links" style="display:none;"></div>
    </header>
    <div id="map"></div>
    <div id="list-wrap">
      <div id="filter-bar" class="filter-bar" style="display:none;">
        <label><input type="checkbox" id="only-internal" /> 내과만</label>
        <label><input type="checkbox" id="sort-internal-first" checked /> 내과 우선 정렬</label>
        <button id="reset-anchor" type="button" style="display:none;background:#1565c0;color:#fff;border:0;padding:4px 8px;border-radius:3px;font-size:11px;cursor:pointer;">동 기준 복귀</button>
        <span class="count" id="filter-count"></span>
      </div>
      <div id="anchor-hint" style="display:none;padding:6px 12px;background:#e8f5e9;border-bottom:1px solid #66bb6a;font-size:12px;color:#1b5e20;">
        💡 지도 클릭 시 그 지점 기준 반경 1km 의원이 표시됩니다.
      </div>
      <div id="list" class="loading">의원 데이터 로드 중…</div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin="anonymous"></script>
  <script>
  (function() {
    const params = new URLSearchParams(window.location.search);
    const adm_cd = window.location.hash.replace('#', '') || params.get('adm_cd') || '11030630';
    const dataUrl = `../data/detail/${adm_cd}.json`;

    const mkIcon = (emoji, size=28, bg='transparent') => L.divIcon({
      html: `<div style="font-size:${size-4}px;line-height:${size}px;text-align:center;width:${size}px;height:${size}px;background:${bg};border-radius:50%;">${emoji}</div>`,
      className: '', iconSize: [size, size], iconAnchor: [size/2, size/2],
    });

    let allClinics = null;  // 전체 의원 (지도 클릭 시 거리 필터용)

    Promise.all([
      fetch(dataUrl).then(r => { if (!r.ok) throw new Error(r.status); return r.json(); }),
      fetch('../data/all_clinics.json').then(r => r.ok ? r.json() : null).catch(() => null),
    ]).then(([d, all]) => {
      allClinics = all;
      render(d);
    }).catch(e => {
      document.getElementById('hdr-body').innerHTML = `<h1>오류</h1><div class="meta">${dataUrl} — ${e}</div>`;
      document.getElementById('list').innerHTML = `<div class="loading">데이터 로드 실패</div>`;
    });

    function haversine(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const toRad = d => d * Math.PI / 180;
      const dLat = toRad(lat2 - lat1), dLon = toRad(lon2 - lon1);
      const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
      return 2 * R * Math.asin(Math.sqrt(a));
    }

    function render(d) {
      // ── Header ──────────
      const m = d.metrics;
      const flags = [];
      if (m.med_desert) flags.push('<span class="flag red">🏜 의료사막</span>');
      if (m.centroid_mismatch) flags.push('<span class="flag">📍 중심점 에러</span>');
      if (m.suburban) flags.push('<span class="flag">🏘 신도시밀집</span>');
      const short = d.name.split(' ').slice(1).join(' ');
      const transitStr = (m.t_transit != null && m.t_transit < 999) ? ` · 🚇 대중교통 ${m.t_transit}분` : '';
      const sidoTagShort = d.sido === '서울특별시' ? '서울' : (d.sido === '경기도' ? '경기' : d.sido);
      const sidoRankStr = d.rank_sido && d.rank_sido > 0 ? `<span class="sido-rank">${sidoTagShort} ${d.rank_sido}위</span>` : '';
      const townTagMap = { gen_1: '1기 신도시', gen_2: '2기 신도시', gen_3: '3기 신도시', seoul_renew: '서울 재개발' };
      const townBadge = d.town_tag ? `<span class="tag">🏗 ${townTagMap[d.town_tag] || d.town_tag}</span>` : '';
      const catchStr = m.catchment_pop_1_5km ? ` · 1.5km 배후 ${(m.catchment_pop_1_5km/1000).toFixed(0)}k (40+ ${(m.catchment_pop_40plus/1000).toFixed(0)}k)` : '';
      const medStr = `<b style="color:#c62828;">내과 의원 ${m.n_clinic_med}개 (의사 ${m.n_doctors_med}명)</b> / 전체 의원 ${m.n_clinic}`;
      const radiusMedStr = `1.5km 내과 의원 ${m.n_within_radius_med}개 (의사 ${m.n_doctors_within_radius_med}명) / 전체 ${m.n_within_radius_all}`;
      document.getElementById('hdr-body').innerHTML = `
        <h1><span class="badge">#${d.rank}</span>${short} <span style="color:#888;font-weight:400;">· 총점 ${d.score}</span>${sidoRankStr}</h1>
        <div class="meta">
          ${townBadge}
          40+ ${m.pop_40plus.toLocaleString()}명 (${(m.ratio_40plus*100).toFixed(0)}%)${catchStr}<br>
          의원: 동내 ${medStr} · ${radiusMedStr}
          <span style="color:#888;font-size:11px;">(반경 의원: 500m ${m.n_clinic_500m} / 1km ${m.n_clinic_1km} / 2km ${m.n_clinic_2km})</span><br>
          🚗 자차 ${m.t_raw}분${transitStr}
          ${d.station ? ` · 🚉 ${d.station.name} ${d.station.dist_m}m (역세권 의원 ${d.station.n_clinic_500m})` : ''}
          ${flags.length ? '<br>' + flags.join('') : ''}
        </div>`;

      // ── 답사 준비 링크 ──────────
      if (d.survey_links) {
        const sl = document.getElementById('survey-links');
        sl.style.display = 'flex';
        sl.innerHTML = `
          <a href="${d.survey_links.kakao_map}" target="_blank" rel="noopener">🗺 카카오맵</a>
          <a href="${d.survey_links.naver_map}" target="_blank" rel="noopener">🗺 네이버지도</a>
          <a class="est" href="${d.survey_links.naver_estate}" target="_blank" rel="noopener">🏢 네이버부동산 (상가)</a>
          <span class="hint">⚠ 매물은 반드시 <b>제1종 근린생활시설</b>만 (의원 개설 가능)</span>
        `;
      }

      // ── Map ──────────
      const map = L.map('map', { zoomControl: true }).setView([d.center.lat, d.center.lon], 14);
      L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap', maxZoom: 19,
      }).addTo(map);

      // 동 경계
      if (d.boundary) {
        L.geoJSON(d.boundary, {
          style: { color: '#1976d2', weight: 2, fillColor: '#1976d2', fillOpacity: 0.06, dashArray: '4,4' }
        }).addTo(map);
      }

      // 반경 원 (점수 산정 기준 — 시인성 강화)
      const radii = [
        { r: 500,  color: '#43a047', label: '500m' },
        { r: 1000, color: '#1e88e5', label: '1km' },
        { r: 2000, color: '#fb8c00', label: '2km' },
      ];
      radii.forEach(({ r, color, label }) => {
        L.circle([d.center.lat, d.center.lon], {
          radius: r, color, weight: 2, opacity: 0.85,
          fillColor: color, fillOpacity: 0.06, dashArray: '5,5',
        }).addTo(map);
        // 원 외곽에 라벨 (북쪽 위치)
        const offsetLat = r / 111000;
        L.marker([d.center.lat + offsetLat, d.center.lon], {
          icon: L.divIcon({
            html: `<div style="background:${color};color:#fff;font-size:10px;font-weight:600;padding:1px 5px;border-radius:8px;white-space:nowrap;box-shadow:0 1px 2px rgba(0,0,0,.3);">${label}</div>`,
            className: '', iconSize: [40, 16], iconAnchor: [20, 8],
          }),
          interactive: false,
        }).addTo(map);
      });

      // 중심점 별 (인구 가중)
      L.marker([d.center.lat, d.center.lon], { icon: mkIcon('⭐', 36) })
       .bindPopup(`<div class="popup-body"><b>${d.name}</b><br>중심점 (인구 가중 — 점수 모델 기준)</div>`).addTo(map);

      // 상가 추정 anchor + convex hull
      if (d.commercial_anchor) {
        const ca = d.commercial_anchor;
        const typeLabel = {
          shops_floor12: `1·2층 상가 ${ca.n_shops_floor12}개의 평균 위치 (동 전체 ${ca.n_shops_total}개)`,
          clinics_in_dong: `동 내 의원 ${ca.n_clinics}개의 평균 위치`,
          clinics_nearby_500m: `500m 이내 의원 ${ca.n_clinics}개의 평균 위치`,
          clinics_nearby_1km: `1km 이내 의원 ${ca.n_clinics}개의 평균 위치`,
          fallback_pop_centroid: '주변 상가·의원 없음 — 인구 중심 폴백'
        }[ca.type] || ca.type;
        L.marker([ca.lat, ca.lon], { icon: mkIcon('🏬', 32) })
         .bindPopup(`<div class="popup-body"><b>🏬 상가 추정 중심</b><br>${typeLabel}<br><i>1종 근생 매물 검색 anchor</i></div>`)
         .addTo(map);
      }
      if (d.commercial_hull && d.commercial_hull.length >= 3) {
        // [lon,lat] → [lat,lon]
        const latlngs = d.commercial_hull.map(([lon, lat]) => [lat, lon]);
        const isShops = d.commercial_anchor && d.commercial_anchor.type === 'shops_floor12';
        L.polygon(latlngs, {
          color: '#9c27b0', weight: 2, opacity: 0.8, dashArray: '4,4',
          fillColor: '#9c27b0', fillOpacity: 0.07,
        }).bindTooltip(isShops ? '1·2층 상가 영역 (1종 근생 매물 후보 zone)' : '의원 군집 영역 (폴백)', { sticky: true }).addTo(map);
      }

      // 역
      if (d.station) {
        L.marker([d.station.lat, d.station.lon], { icon: mkIcon('🚇', 32) })
         .bindPopup(`<div class="popup-body"><b>🚇 ${d.station.name}</b><br>중심점에서 ${d.station.dist_m}m<br>역 500m 내 의원 ${d.station.n_clinic_500m}개</div>`).addTo(map);
      }

      // 의원 핀 — 내과 = 빨강, 소화기 = 별표, 그 외 = 회색
      const markers = [];
      d.clinics.forEach((c, i) => {
        const color = c.is_internal ? '#e53935' : (c.kind.includes('의원') ? '#9e9e9e' : '#bdbdbd');
        const radius = c.is_internal ? 10 : 5;
        const opacity = c.is_internal ? 0.85 : 0.4;
        const popupHtml = `
          <div class="popup-body">
            <b>${c.is_gi ? '⭐ ' : ''}${c.is_internal ? '<span style="color:#e53935;">[내과] </span>' : ''}${c.name}</b><br>
            ${c.kind}${c.drs ? ` · 의사 ${c.drs}명` : ''}${c.estb_year ? ` · ${c.estb_year} 개원` : ''}<br>
            ${c.addr ? `📍 ${c.addr}<br>` : ''}
            ${c.tel ? `☎ <a href="tel:${c.tel}">${c.tel}</a><br>` : ''}
            ${c.hosp_url ? `🌐 <a href="${c.hosp_url}" target="_blank">홈페이지</a>` : `🔍 <a href="${c.search_url}" target="_blank">네이버 검색</a>`}
          </div>`;
        const marker = L.circleMarker([c.lat, c.lon], {
          radius, color, weight: 2, fillColor: color, fillOpacity: opacity,
        }).bindPopup(popupHtml).addTo(map);
        markers.push(marker);
      });

      // ── List ──────────
      const listEl = document.getElementById('list');
      const filterBar = document.getElementById('filter-bar');
      const onlyInternal = document.getElementById('only-internal');
      const sortInternalFirst = document.getElementById('sort-internal-first');
      const countEl = document.getElementById('filter-count');

      if (!d.clinics.length) {
        listEl.innerHTML = '<div class="loading">반경 1km 내 의원 없음</div>';
        return;
      }
      filterBar.style.display = 'flex';

      function renderClinicList(source) {
        const base = source || d.clinics;
        let items = base.slice();
        if (onlyInternal.checked) items = items.filter(c => c.is_internal);
        if (sortInternalFirst.checked) {
          items.sort((a, b) => {
            if (a.is_internal !== b.is_internal) return a.is_internal ? -1 : 1;
            return a.dist - b.dist;
          });
        }
        const intCnt = base.filter(c => c.is_internal).length;
        const tag = source ? '🎯 1km 내' : '동 기준';
        countEl.textContent = `${tag} · 내과 ${intCnt}개 / 전체 ${base.length}개`;

        listEl.innerHTML = '';
        items.forEach((c) => {
          const origIdx = d.clinics.indexOf(c);
          const row = document.createElement('div');
          row.className = 'clinic' + (c.is_gi ? ' gi' : (c.is_internal ? ' internal' : ''));
          const tagHtml = c.is_gi ? '<span class="gi-star">⭐</span> '
                        : (c.is_internal ? '<span class="int-tag">내과</span>' : '');
          const linkBtn = c.hosp_url
            ? `<a class="home" href="${c.hosp_url}" target="_blank" onclick="event.stopPropagation();">🌐 홈페이지</a>`
            : `<a href="${c.search_url}" target="_blank" onclick="event.stopPropagation();">🔍 네이버 검색</a>`;
          row.innerHTML = `
            <div class="top">
              <span class="dist">${c.dist}m</span>
              <span class="name">${tagHtml}${c.name}</span>
              <span class="kind">${c.kind}</span>
            </div>
            <div class="sub">
              ${c.drs ? `의사 ${c.drs}명 · ` : ''}
              ${c.estb_year ? `${c.estb_year} 개원 · ` : ''}
              ${c.addr}
              ${c.tel ? `<br>☎ ${c.tel}` : ''}
            </div>
            <div class="links">
              ${linkBtn}
              ${c.tel ? `<a href="tel:${c.tel}" onclick="event.stopPropagation();">📞 전화</a>` : ''}
            </div>`;
          row.addEventListener('click', () => {
            document.querySelectorAll('.clinic').forEach(r => r.classList.remove('active'));
            row.classList.add('active');
            map.setView([c.lat, c.lon], 17);
            markers[origIdx].openPopup();
          });
          listEl.appendChild(row);
        });
      }

      onlyInternal.addEventListener('change', () => renderClinicList());
      sortInternalFirst.addEventListener('change', () => renderClinicList());
      renderClinicList();

      // ── 지도 클릭 → custom anchor 모드 ──────────
      let clickMarker = null;
      let clickCircles = [];
      const resetBtn = document.getElementById('reset-anchor');
      const anchorHint = document.getElementById('anchor-hint');
      if (allClinics) anchorHint.style.display = 'block';

      function clearClickAnchor() {
        if (clickMarker) { map.removeLayer(clickMarker); clickMarker = null; }
        clickCircles.forEach(c => map.removeLayer(c));
        clickCircles = [];
        resetBtn.style.display = 'none';
        renderClinicList();  // 동 기준으로 복귀
      }

      resetBtn.addEventListener('click', clearClickAnchor);

      map.on('click', (e) => {
        if (!allClinics) return;
        const { lat, lng } = e.latlng;
        // 기존 마커·원 정리
        if (clickMarker) map.removeLayer(clickMarker);
        clickCircles.forEach(c => map.removeLayer(c));
        clickCircles = [];

        // 새 anchor 마커
        clickMarker = L.marker([lat, lng], { icon: mkIcon('🎯', 36) })
          .bindPopup(`<div class="popup-body"><b>🎯 임의 anchor</b><br>${lat.toFixed(5)}, ${lng.toFixed(5)}</div>`)
          .addTo(map);
        // 반경 원 (500m, 1km)
        clickCircles.push(L.circle([lat, lng], { radius: 500, color: '#43a047', weight: 2, opacity: 0.7, fillColor: '#43a047', fillOpacity: 0.05, dashArray: '4,4' }).addTo(map));
        clickCircles.push(L.circle([lat, lng], { radius: 1000, color: '#1e88e5', weight: 2, opacity: 0.7, fillColor: '#1e88e5', fillOpacity: 0.04, dashArray: '4,4' }).addTo(map));
        resetBtn.style.display = 'inline-block';

        // 1km 안 의원 필터 + 거리 부여
        const RADIUS_M = 1000;
        const filtered = [];
        for (const c of allClinics) {
          const dm = haversine(lat, lng, c.la, c.lo);
          if (dm <= RADIUS_M) {
            filtered.push({
              name: c.n, lat: c.la, lon: c.lo, dist: Math.round(dm),
              kind: c.k, is_gi: c.g, is_internal: c.i, drs: c.d,
              addr: c.a, tel: c.t, estb_year: c.y, hosp_url: c.u,
              search_url: `https://search.naver.com/search.naver?query=${encodeURIComponent((c.n||'')+' '+((c.a||'').split(',')[0]||''))}`,
            });
          }
        }
        renderClinicList(filtered);
      });
    }
  })();
  </script>
</body>
