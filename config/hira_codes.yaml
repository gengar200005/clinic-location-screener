# HIRA OpenAPI 진료과목 코드
# ⚠️ 아래 값은 플레이스홀더 — 2주차 착수 시 공식 확인 필수:
#    보건의료빅데이터개방시스템 opendata.hira.or.kr → 용어설명 → 진료과목코드
#
# 검증 방법: 실제 API 호출 후 dgsbjtCd 분포 확인 + 이촌1동 등 알려진 동에서
# 내과 의원 수가 직관(1~3개)과 일치하는지 수작업 비교

diagnostic_codes:
  internal_medicine: "01"         # 내과 (추정)
  gastroenterology: null           # 소화기내과 별도 세분 코드 — 확인 필요
  # 참고: HIRA는 "내과"를 세부 분과 없이 통합 코드 '01'만 제공할 가능성 있음.
  # 이 경우 병원명에 "소화기" 포함 여부로 2차 필터.

# 스코어링에 포함할 코드 집합 (위 딕셔너리 기반, 2주차 확정)
include_codes:
  - "01"

# 의원 구분 (종별코드)
# 종별코드는 data.go.kr 스펙 참조
clinic_types:
  - "31"  # 의원 (추정) — 확인 필요
